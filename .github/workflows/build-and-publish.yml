name: Build & Publish Microservices

# Builds the three pedelec microservices and publishes them to GitHub Container
# Registry under ghcr.io/<repo-owner>/pedelec-<service>.
#
# This workflow is designed to work on any fork without modification:
#   - Image namespace is derived from ${{ github.repository_owner }} (no hardcoded names)
#   - Auth uses the built-in GITHUB_TOKEN (no PAT setup required)
#   - PRs build but do not push, so external contributions stay safe
#
# One-time manual step on a fresh fork: GHCR packages created by GITHUB_TOKEN
# start *private*. After the first successful run on a fork, visit
#   https://github.com/<owner>?tab=packages
# and switch each `pedelec-*` package to *public* (Package settings → Change visibility).

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [damage, location, reservation]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize owner name to lowercase
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/pedelec-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=pedelec-${{ matrix.service }}
            org.opencontainers.image.description=Pedelec workshop ${{ matrix.service }} microservice
            org.opencontainers.image.licenses=CC-BY-4.0

      - name: Build${{ github.event_name != 'pull_request' && ' & push' || '' }}
        uses: docker/build-push-action@v6
        with:
          context: exercises/01-microservices/${{ matrix.service }}
          file: exercises/01-microservices/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
